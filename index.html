<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineverse</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="navbar">
        <img id="logo" src="assets/LOGO.png" alt="Cineverse Logo">

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Movies</a>
            <a href="#">Series</a>
            <a href="#">Contact</a>
        </div>

        <div class="search-bar">
            <input id="searchInput" type="text" placeholder="Search...">
        </div>

        <select id="filterRating">
            <option value="all">All Ratings</option>
            <option value="7">Above 7 ⭐</option>
            <option value="8">Above 8 ⭐</option>
        </select>

        <select id="sortMovies">
            <option value="default">Sort By</option>
            <option value="ratingHigh">Rating High → Low</option>
            <option value="ratingLow">Rating Low → High</option>
            <option value="title">Title A → Z</option>
        </select>

        <div class="user-actions">
            <a href="#">Login</a>
            <a href="#">Sign Up</a>
        </div>

        <div class="profile">
            <i class="fa-solid fa-user"></i>
        </div>
    </div>

    <div class="hero-section">

        <div class="slider">

            <div class="slides">

                <div class="slide">
                    <img src="https://images2.alphacoders.com/111/1119554.jpg">
                    <div class="hero-info">
                        <h1>Avengers: Endgame</h1>
                        <p>⭐ 8.4</p>
                        <button>Watch Now</button>
                    </div>
                </div>

            </div>

            <button class="prev">&#10094;</button>
            <button class="next">&#10095;</button>

        </div>

        <div id="movies-container"></div>

    </div>

    <footer class="footer">

        <div class="footer-container">

            <div class="footer-left">
                <h2>CineVerse</h2>
                <p>Your gateway to explore movies.</p>
            </div>

            <div class="footer-links">
                <a href="#">Home</a>
                <a href="#">Movies</a>
                <a href="#">Series</a>
                <a href="#">Contact</a>
            </div>

            <div class="footer-social">
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-twitter"></i>
            </div>

        </div>

        <div class="footer-bottom">
            <p>© 2026 CineVerse. All rights reserved.</p>
        </div>

    </footer>

    <script src="script.js"></script>

</body>
</html>
